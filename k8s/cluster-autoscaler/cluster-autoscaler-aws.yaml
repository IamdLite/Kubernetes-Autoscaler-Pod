# Cluster Autoscaler for AWS EKS.
#
# BEFORE APPLYING:
#   1. Replace <YOUR_CLUSTER_NAME> with your real EKS cluster name (3 places).
#   2. Tag your Auto Scaling Group(s) with:
#        k8s.io/cluster-autoscaler/enabled              = true
#        k8s.io/cluster-autoscaler/<YOUR_CLUSTER_NAME>  = owned
#   3. Create an IAM policy with these actions and attach it to the
#      ServiceAccount via IRSA (or to the node IAM role):
#        - autoscaling:DescribeAutoScalingGroups
#        - autoscaling:DescribeAutoScalingInstances
#        - autoscaling:DescribeLaunchConfigurations
#        - autoscaling:DescribeScalingActivities
#        - autoscaling:DescribeTags
#        - autoscaling:SetDesiredCapacity
#        - autoscaling:TerminateInstanceInAutoScalingGroup
#        - ec2:DescribeImages
#        - ec2:DescribeInstanceTypes
#        - ec2:DescribeLaunchTemplateVersions
#        - ec2:GetInstanceTypesFromInstanceRequirements
#        - eks:DescribeNodegroup
#
# Reference:
#   https://github.com/kubernetes/autoscaler/tree/master/cluster-autoscaler/cloudprovider/aws
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    k8s-app: cluster-autoscaler
  annotations:
    # Replace ACCOUNT_ID and ROLE_NAME with your IRSA role:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/ROLE_NAME
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-autoscaler
  labels:
    k8s-app: cluster-autoscaler
rules:
  - apiGroups: [""]
    resources: [events, endpoints]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [pods/eviction]
    verbs: [create]
  - apiGroups: [""]
    resources: [pods/status]
    verbs: [update]
  - apiGroups: [""]
    resources: [endpoints]
    resourceNames: [cluster-autoscaler]
    verbs: [get, update]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [watch, list, get, update]
  - apiGroups: [""]
    resources:
      - pods
      - services
      - replicationcontrollers
      - persistentvolumeclaims
      - persistentvolumes
    verbs: [watch, list, get]
  - apiGroups: [extensions]
    resources: [replicasets, daemonsets]
    verbs: [watch, list, get]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [watch, list]
  - apiGroups: [apps]
    resources: [statefulsets, replicasets, daemonsets]
    verbs: [watch, list, get]
  - apiGroups: [storage.k8s.io]
    resources: [storageclasses, csinodes, csidrivers, csistoragecapacities]
    verbs: [watch, list, get]
  - apiGroups: [batch, extensions]
    resources: [jobs]
    verbs: [get, list, watch, patch]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [create]
  - apiGroups: [coordination.k8s.io]
    resourceNames: [cluster-autoscaler]
    resources: [leases]
    verbs: [get, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    k8s-app: cluster-autoscaler
rules:
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [create, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    resourceNames:
      - cluster-autoscaler-status
      - cluster-autoscaler-priority-expander
    verbs: [delete, get, update, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-autoscaler
  labels:
    k8s-app: cluster-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-autoscaler
subjects:
  - kind: ServiceAccount
    name: cluster-autoscaler
    namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    k8s-app: cluster-autoscaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cluster-autoscaler
subjects:
  - kind: ServiceAccount
    name: cluster-autoscaler
    namespace: kube-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-autoscaler
  namespace: kube-system
  labels:
    app: cluster-autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-autoscaler
  template:
    metadata:
      labels:
        app: cluster-autoscaler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
    spec:
      priorityClassName: system-cluster-critical
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: cluster-autoscaler
      containers:
        - image: registry.k8s.io/autoscaling/cluster-autoscaler:v1.30.0
          name: cluster-autoscaler
          resources:
            limits:
              cpu: 100m
              memory: 600Mi
            requests:
              cpu: 100m
              memory: 600Mi
          command:
            - ./cluster-autoscaler
            - --v=4
            - --stderrthreshold=info
            - --cloud-provider=aws
            - --skip-nodes-with-local-storage=false
            - --expander=least-waste
            - --node-group-auto-discovery=asg:tag=k8s.io/cluster-autoscaler/enabled,k8s.io/cluster-autoscaler/<YOUR_CLUSTER_NAME>
            - --balance-similar-node-groups
            - --skip-nodes-with-system-pods=false
          volumeMounts:
            - name: ssl-certs
              mountPath: /etc/ssl/certs/ca-certificates.crt
              readOnly: true
          imagePullPolicy: "Always"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
      volumes:
        - name: ssl-certs
          hostPath:
            path: "/etc/ssl/certs/ca-bundle.crt"
