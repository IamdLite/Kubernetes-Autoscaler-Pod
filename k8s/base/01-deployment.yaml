# Deployment for the HPA demo app.
#
# Key things to notice (required for HPA to work):
#   - resources.requests.cpu/memory MUST be set, or HPA cannot compute
#     a utilization percentage and will report <unknown>/50%.
#   - replicas is set low (2) so we can clearly see scale-up in action.
#   - readinessProbe + livenessProbe wired to /healthz so pods only
#     receive traffic once they're actually ready.
#
# The image tag uses a placeholder. Replace `hpa-demo-app:1.0.0` with
# whatever you push to your registry (Docker Hub, GHCR, ECR, etc.) OR
# build it locally into minikube:  `eval $(minikube docker-env)` first.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: hpa-demo-app
  namespace: hpa-demo
  labels:
    app: hpa-demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hpa-demo-app
  template:
    metadata:
      labels:
        app: hpa-demo-app
    spec:
      containers:
        - name: app
          image: hpa-demo-app:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          # *** REQUIRED FOR HPA ***
          # HPA computes utilization as (current usage / request).
          # Without requests, HPA cannot scale on resource metrics.
          resources:
            requests:
              cpu: "100m"      # 0.1 CPU core
              memory: "128Mi"
            limits:
              cpu: "500m"      # 0.5 CPU core max
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
