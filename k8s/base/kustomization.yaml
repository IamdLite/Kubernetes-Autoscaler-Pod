# Kustomization lets us apply the whole stack with one command:
#   kubectl apply -k k8s/base
#
# It also makes it easy to overlay environment-specific changes
# later (image tag, replica count, etc.) without editing the base files.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hpa-demo

resources:
  - 00-namespace.yaml
  - 01-deployment.yaml
  - 02-service.yaml
  - 03-hpa.yaml

commonLabels:
  app.kubernetes.io/part-of: hpa-demo
  app.kubernetes.io/managed-by: kustomize
